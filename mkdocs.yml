site_name: Ludmila / ATHIS-DF — Assessoria Técnica em Habitação de Interesse Social
site_description: Acompanhamento da parceria com Dra. Ludmila Correia (CAU DF) — projetos, seminários, editais e articulação ATHIS
site_url: https://takwaratec.github.io/ludmila-athis-df
repo_url: https://github.com/takwaratec/ludmila-athis-df
repo_name: takwaratec/ludmila-athis-df
edit_uri: edit/main/docs/
copyright: "(c) Tecnologia Takwara, 2026. CC BY 4.0"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - "Inicio": index.md
  - "ATA 07/07/2026": atas/2026-07-07_ATA_ALINHAMENTO_FORMACAO_ATHIS.md
